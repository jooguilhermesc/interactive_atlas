name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify paleo data
        run: |
          count=$(ls public/data/paleo/*.geojson 2>/dev/null | wc -l)
          echo "Paleo snapshots disponíveis: $count"
          if [ "$count" -lt 15 ]; then
            echo "Buscando snapshots faltantes..."
            pip install requests -q
            python3 scripts/fetch_paleo_snapshots.py
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
